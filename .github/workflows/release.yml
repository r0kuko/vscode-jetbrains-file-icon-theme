name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Collect release metadata
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
      - name: Check notification credentials
        id: secrets-check
        env:
          BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
          BOT_PRIVATE_KEY: ${{ secrets.BOT_PRIVATE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$BOT_APP_ID" ] && [ -n "$BOT_PRIVATE_KEY" ]; then
            echo "has_bot=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_bot=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "has_telegram=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_telegram=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate release bot token
        id: bot-token
        if: ${{ steps.secrets-check.outputs.has_bot == 'true' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
      - name: Validate extension manifest
        run: npm run validate:manifest
      - name: Validate icon themes
        run: npm run validate
      - name: Publish to VS Code Marketplace
        id: publish-vsce
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set +e
          npx --yes @vscode/vsce publish --no-dependencies > publish-vsce.log 2>&1
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
      - name: Publish to Open VSX
        id: publish-ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set +e
          npx --yes ovsx publish --no-dependencies > publish-ovsx.log 2>&1
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
      - name: Prepare release notification body
        if: always()
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_RUN_URL: ${{ steps.meta.outputs.run_url }}
          VSCE_STATUS: ${{ steps.publish-vsce.outputs.status }}
          VSCE_EXIT_CODE: ${{ steps.publish-vsce.outputs.exit_code }}
          OVSX_STATUS: ${{ steps.publish-ovsx.outputs.status }}
          OVSX_EXIT_CODE: ${{ steps.publish-ovsx.outputs.exit_code }}
        run: |
          trim_log() {
            local file="$1"
            if [ -f "$file" ]; then
              tail -n 40 "$file" | sed 's/\r$//'
            else
              echo "No output captured."
            fi
          }

          if [ "$VSCE_STATUS" = "success" ] && [ "$OVSX_STATUS" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="Release deployed"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="Release failed"
          fi

          {
            echo "### ${STATUS_ICON} ${STATUS_TEXT}"
            echo
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- VS Code Marketplace: \`${VSCE_STATUS}\` (exit code: \`${VSCE_EXIT_CODE}\`)"
            echo "- Open VSX: \`${OVSX_STATUS}\` (exit code: \`${OVSX_EXIT_CODE}\`)"
            echo "- Workflow run: [\`${GITHUB_RUN_ID}\`](${RELEASE_RUN_URL})"
            echo
            echo "<details><summary>VS Code Marketplace output</summary>"
            echo
            echo '```text'
            trim_log publish-vsce.log
            echo '```'
            echo "</details>"
            echo
            echo "<details><summary>Open VSX output</summary>"
            echo
            echo '```text'
            trim_log publish-ovsx.log
            echo '```'
            echo "</details>"
          } > release-comment.md
      - name: Post release bot comment
        if: ${{ always() && steps.bot-token.outputs.token != '' }}
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          COMMENT_BODY="$(cat release-comment.md)"
          PRS_JSON="$(gh api -H "Accept: application/vnd.github+json" "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" || echo '[]')"
          PR_NUMBER="$(printf '%s' "$PRS_JSON" | node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(data[0]?.number ? String(data[0].number) : '')")"

          if [ -n "$PR_NUMBER" ]; then
            gh api \
              --method POST \
              "/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="$COMMENT_BODY"
          else
            gh api \
              --method POST \
              "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" \
              -f body="$COMMENT_BODY"
          fi
      - name: Send Telegram notification
        if: ${{ always() && steps.secrets-check.outputs.has_telegram == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_RUN_URL: ${{ steps.meta.outputs.run_url }}
          VSCE_STATUS: ${{ steps.publish-vsce.outputs.status }}
          VSCE_EXIT_CODE: ${{ steps.publish-vsce.outputs.exit_code }}
          OVSX_STATUS: ${{ steps.publish-ovsx.outputs.status }}
          OVSX_EXIT_CODE: ${{ steps.publish-ovsx.outputs.exit_code }}
        run: |
          if [ "$VSCE_STATUS" = "success" ] && [ "$OVSX_STATUS" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="Release deployed"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="Release failed"
          fi

          TELEGRAM_TEXT="$(printf '%s\n%s\n%s\n%s\n%s\n%s\n%s' \
            "<b>${STATUS_ICON} ${STATUS_TEXT}</b>" \
            "<b>Repository:</b> ${GITHUB_REPOSITORY}" \
            "<b>Version:</b> ${RELEASE_VERSION}" \
            "<b>Commit:</b> <code>${GITHUB_SHA}</code>" \
            "<b>VS Code Marketplace:</b> ${VSCE_STATUS} (exit code: ${VSCE_EXIT_CODE})" \
            "<b>Open VSX:</b> ${OVSX_STATUS} (exit code: ${OVSX_EXIT_CODE})" \
            "<b>Run:</b> ${RELEASE_RUN_URL}")"

          curl --fail --silent --show-error \
            --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TELEGRAM_TEXT}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true"
      - name: Fail workflow if publish failed
        if: ${{ steps.publish-vsce.outputs.status != 'success' || steps.publish-ovsx.outputs.status != 'success' }}
        run: exit 1
