name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile TypeScript
        run: bun run compile

      - name: Run tests
        run: bun run test

      - name: Validate extension manifest
        run: bun run validate:manifest

      - name: Validate icon themes
        run: bun run validate

      - name: Package VSIX (smoke test)
        run: bunx --bun @vscode/vsce package --no-dependencies --out "jetbrains-newui-file-icon-theme-${{ github.sha }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 7
